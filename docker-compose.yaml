services:
  postgres:
    image: postgres:16-alpine
    container_name: gethired_postgres
    environment:
      POSTGRES_USER: gethired1
      POSTGRES_PASSWORD: w94379520
      POSTGRES_DB: gethired
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gethired_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: